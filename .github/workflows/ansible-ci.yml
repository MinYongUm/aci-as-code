# =============================================================================
# GitHub Actions Workflow: Ansible CI
# 파일: .github/workflows/ansible-ci.yml
#
# 트리거:
#   - PR → main 브랜치 (ansible/ 변경 시)
#   - main 브랜치 push (동일 경로 변경 시)
#
# 실행 단계:
#   1. yaml-lint    → YAML 문법/스타일 검사 (.yamllint 설정 기준)
#   2. ansible-lint → Ansible 모범 사례 검사 (ansible-lint 설정 기준)
#
# 참고:
#   - 실제 APIC 연결 없음 (lint only)
#   - vault.yml은 gitignore 처리 → lint 대상에서 제외
#   - cisco.aci 컬렉션 설치 필요 (ansible-lint이 모듈 유효성 검사 시 참조)
# =============================================================================

name: Ansible CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'ansible/**'
      - '.yamllint'
      - '.ansible-lint'
  push:
    branches:
      - main
    paths:
      - 'ansible/**'
      - '.yamllint'
      - '.ansible-lint'

concurrency:
  group: ansible-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job: yaml-lint
  # 역할: YAML 파일 문법/스타일 일관성 검사
  #       들여쓰기, 따옴표 스타일, 줄 길이 등 .yamllint 기준으로 검사
  # ---------------------------------------------------------------------------
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yamllint
        run: pip install yamllint

      # ansible/ 디렉토리 전체 YAML 파일 검사
      # vault.yml은 암호화된 파일이므로 .yamllint에서 ignore 처리
      - name: Run yamllint
        run: yamllint ansible/

  # ---------------------------------------------------------------------------
  # Job: ansible-lint
  # 역할: Ansible 플레이북/롤의 모범 사례 검사
  #       실제 APIC 연결 없이 정적 분석만 수행
  # ---------------------------------------------------------------------------
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    needs: yaml-lint  # YAML 오류 없을 때만 실행

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # cisco.aci 컬렉션 설치
      # ansible-lint이 모듈 파라미터 유효성 검사 시 컬렉션이 필요함
      # -----------------------------------------------------------------------
      - name: Install Ansible and cisco.aci collection
        run: |
          pip install ansible ansible-lint
          ansible-galaxy collection install cisco.aci:==2.8.0

      # -----------------------------------------------------------------------
      # ansible-lint 실행
      # .ansible-lint 설정 파일 기준으로 검사
      # ansible/roles/ 및 ansible/scenarios/ 대상
      # -----------------------------------------------------------------------
      - name: Run ansible-lint
        run: ansible-lint ansible/
        env:
          # ANSIBLE_ROLES_PATH: roles 디렉토리 위치 알림
          ANSIBLE_ROLES_PATH: ansible/roles
          # vault.yml 복호화 없이 lint 실행 (실제 값 불필요)
          ANSIBLE_VAULT_PASSWORD_FILE: /dev/null

      # -----------------------------------------------------------------------
      # Scenario별 플레이북 문법 검사 (ansible-lint 보완)
      # --syntax-check: APIC 연결 없이 플레이북 구조/문법만 검사
      # -----------------------------------------------------------------------
      - name: Syntax Check — Scenario 01
        working-directory: ansible/scenarios/01_basic_tenant
        run: >
          ansible-playbook -i inventory.yml site.yml
          --syntax-check
        env:
          ANSIBLE_ROLES_PATH: ../../../ansible/roles