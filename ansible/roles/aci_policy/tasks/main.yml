---
# =============================================================================
# Role: aci_policy
# 파일: tasks/main.yml
# 역할: Filter, Filter Entry, Contract, Subject, Subject-Filter 바인딩을 생성/삭제한다
#
# ACI 오브젝트 계층:
#   Contract (vzBrCP)           → uni/tn-{tenant}/brc-{name}
#   └── Subject (vzSubj)        → uni/tn-{tenant}/brc-{name}/subj-{name}
#       └── Filter (vzFilter)   → uni/tn-{tenant}/flt-{name}
#           └── Entry (vzEntry) → uni/tn-{tenant}/flt-{name}/e-{name}
#
# 변수 구조 (group_vars/all/main.yml):
#   filters:   list(object) → Filter / Entry 정의
#   contracts: list(object) → Contract / Subject / Filter 연결 정의
#
# Scenario 01: Filter 1개 / Contract 1개
# Scenario 02: Filter 2개 / Contract 2개 (web-to-app / app-to-db)
#
# Terraform 모듈 비교:
#   terraform/modules/policy/main.tf
#   aci_filter + aci_filter_entry + aci_contract + aci_contract_subject
#
# Ansible vs Terraform 핵심 차이:
#   Terraform: Subject 생성 시 relation_vz_rs_subj_filt_att 속성으로 Filter 한 번에 연결
#   Ansible:   aci_contract_subject_to_filter 별도 모듈 사용 (Task 5에서 분리 처리)
# =============================================================================


# -----------------------------------------------------------------------------
# Task 1: Filter 생성/삭제
# cisco.aci.aci_filter → ACI 오브젝트: vzFilter
#
# Terraform 대응:
#   resource "aci_filter" "this" {
#     for_each    = var.filters   ← 맵 키로 반복
#     tenant_dn   = var.tenant_dn
#     name        = each.key
#   }
# -----------------------------------------------------------------------------
- name: "Manage Filter | {{ item.name }}"
  cisco.aci.aci_filter:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"
    tenant:         "{{ tenant_name }}"
    filter:         "{{ item.name }}"
    description:    "{{ item.description | default('') }}"
    state:          "{{ aci_state }}"

  loop: "{{ filters }}"
  loop_control:
    label: "{{ tenant_name }} / {{ item.name }}"


# -----------------------------------------------------------------------------
# Task 2: Filter Entry 생성/삭제
# cisco.aci.aci_filter_entry → ACI 오브젝트: vzEntry
#
# subelements('entries') 동작:
#   입력: filters = [
#           { name: "filter-app", entries: [{name: "tcp-8080", ...}] },
#           { name: "filter-db",  entries: [{name: "tcp-5432", ...}] }
#         ]
#   출력: [(filter-app, tcp-8080), (filter-db, tcp-5432)]
#   → item.0 = Filter 오브젝트, item.1 = Entry 오브젝트
#
# Terraform 대응:
#   resource "aci_filter_entry" "this" {
#     for_each    = { for fe in local.filter_entries : "${fe.filter_name}__${fe.entry_name}" => fe }
#     prot        = each.value.ip_proto     ← v2.18: ip_proto → prot
#     d_from_port = each.value.d_from_port
#     d_to_port   = each.value.d_to_port
#   }
#
# Ansible vs Terraform 속성명 차이 (혼동 주의):
#   Terraform: prot           → Ansible: ip_protocol
#   Terraform: d_from_port    → Ansible: dst_port_start
#   Terraform: d_to_port      → Ansible: dst_port_end
# -----------------------------------------------------------------------------
- name: "Manage Filter Entry | {{ item.0.name }} / {{ item.1.name }}"
  cisco.aci.aci_filter_entry:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"
    tenant:         "{{ tenant_name }}"
    filter:         "{{ item.0.name }}"
    filter_entry:   "{{ item.1.name }}"
    description:    "{{ item.1.description | default('') }}"
    # ether_type: L3 프로토콜 (Terraform: ether_t)
    #   ip → IPv4   arp → ARP   unspecified → 모든 L3
    ether_type:     "{{ item.1.ether_type | default('unspecified') }}"
    # ip_protocol: L4 프로토콜 (Terraform: prot)
    #   tcp / udp / icmp / unspecified
    ip_protocol:    "{{ item.1.ip_protocol | default('unspecified') }}"
    # 목적지 포트 범위 (Terraform: d_from_port / d_to_port)
    dst_port_start: "{{ item.1.dst_port_start | default('unspecified') }}"
    dst_port_end:   "{{ item.1.dst_port_end | default('unspecified') }}"
    state:          "{{ aci_state }}"

  loop: "{{ filters | subelements('entries') }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.name }}"


# -----------------------------------------------------------------------------
# Task 3: Contract 생성/삭제
# cisco.aci.aci_contract → ACI 오브젝트: vzBrCP
#
# Terraform 대응:
#   resource "aci_contract" "this" {
#     tenant_dn = var.tenant_dn
#     name      = var.contract_name
#     scope     = var.contract_scope
#   }
# -----------------------------------------------------------------------------
- name: "Manage Contract | {{ item.name }}"
  cisco.aci.aci_contract:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"
    tenant:         "{{ tenant_name }}"
    contract:       "{{ item.name }}"
    description:    "{{ item.description | default('') }}"
    # scope: Contract 적용 범위
    #   tenant → 동일 Tenant 내 EPG 간 (가장 일반적)
    #   vrf    → 동일 VRF 내 EPG 간
    #   global → Tenant 경계 초월
    scope:          "{{ item.scope | default('tenant') }}"
    state:          "{{ aci_state }}"

  loop: "{{ contracts }}"
  loop_control:
    label: "{{ tenant_name }} / {{ item.name }}"


# -----------------------------------------------------------------------------
# Task 4: Contract Subject 생성/삭제
# cisco.aci.aci_contract_subject → ACI 오브젝트: vzSubj
#
# Terraform 대응:
#   resource "aci_contract_subject" "this" {
#     contract_dn = aci_contract.this.id
#     name        = var.subject_name
#     relation_vz_rs_subj_filt_att = [for f in aci_filter.this : f.id]
#   }
# → Terraform은 Subject 속성으로 Filter 연결까지 한 번에 처리
# → Ansible은 Subject 생성(Task 4)과 Filter 연결(Task 5)을 분리
# -----------------------------------------------------------------------------
- name: "Manage Contract Subject | {{ item.name }} / {{ item.subject }}"
  cisco.aci.aci_contract_subject:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"
    tenant:         "{{ tenant_name }}"
    contract:       "{{ item.name }}"
    subject:        "{{ item.subject }}"
    description:    "{{ item.subject_description | default('') }}"
    state:          "{{ aci_state }}"

  loop: "{{ contracts }}"
  loop_control:
    label: "{{ item.name }} / {{ item.subject }}"


# -----------------------------------------------------------------------------
# Task 5: Subject → Filter 바인딩
# cisco.aci.aci_contract_subject_to_filter → ACI 오브젝트: vzRsSubjFiltAtt
#
# Terraform vs Ansible 구조 차이 (핵심):
#   Terraform: aci_contract_subject 의 relation_vz_rs_subj_filt_att 속성에
#              Filter DN 리스트를 선언 → 한 번에 연결 (선언형)
#   Ansible:   aci_contract_subject_to_filter 별도 모듈 → 바인딩마다 태스크 (절차형)
#              → 더 명시적, 개별 삭제 가능, 가시성 높음
#
# contracts 리스트에서 각 Contract의 filter 필드를 참조
# Scenario 01: allow-http → filter-http
# Scenario 02: web-to-app → filter-app / app-to-db → filter-db
# -----------------------------------------------------------------------------
- name: "Manage Subject-Filter binding | {{ item.subject }} → {{ item.filter }}"
  cisco.aci.aci_contract_subject_to_filter:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"
    tenant:         "{{ tenant_name }}"
    contract:       "{{ item.name }}"
    subject:        "{{ item.subject }}"
    filter:         "{{ item.filter }}"
    state:          "{{ aci_state }}"

  loop: "{{ contracts }}"
  loop_control:
    label: "{{ item.name }} / {{ item.subject }} → {{ item.filter }}"


# -----------------------------------------------------------------------------
# Task 6: 생성 결과 출력
# -----------------------------------------------------------------------------
- name: "Debug | Policy DN"
  ansible.builtin.debug:
    msg:
      - "Filter   DN : uni/tn-{{ tenant_name }}/flt-{{ item.filter }}"
      - "Contract DN : uni/tn-{{ tenant_name }}/brc-{{ item.name }}"
      - "Subject  DN : uni/tn-{{ tenant_name }}/brc-{{ item.name }}/subj-{{ item.subject }}"
  loop: "{{ contracts }}"
  loop_control:
    label: "{{ item.name }}"
  when: aci_state == "present"