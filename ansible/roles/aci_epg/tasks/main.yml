---
# =============================================================================
# Role: aci_epg
# 파일: tasks/main.yml
# 역할: Application Profile, EPG를 생성하고 Contract를 바인딩한다
#
# ACI 오브젝트:
#   Application Profile (fvAp)  → uni/tn-{tenant}/ap-{name}
#   EPG (fvAEPg)                → uni/tn-{tenant}/ap-{ap}/epg-{name}
#   Contract 바인딩 (fvRsProv / fvRsCons)
#
# 변수 구조 (group_vars/all/main.yml):
#   application_profiles: list(object)   ← AP / EPG 계층 정의
#     - name, description
#       epgs: list(object)
#         - name, description, bd
#   epg_contract_bindings: list(object)  ← EPG-Contract 바인딩 플랫 리스트
#     - ap, epg, contract, type
#
# epg_contract_bindings를 플랫 리스트로 분리한 이유:
#   Ansible은 중첩 루프 미지원 → AP → EPG → contracts 3단계 중첩 처리 불가
#   set_fact + 복잡한 Jinja2보다 명시적 플랫 리스트가 가독성/유지보수 측면 우수
#   운영 엔지니어 관점에서 바인딩 관계를 한눈에 파악 가능
#
# Scenario 01: AP 1개 / EPG 1개 / Contract 바인딩 2개 (provider + consumer)
# Scenario 02: AP 1개 / EPG 3개 / Contract 바인딩 4개
#
# Terraform 모듈 비교:
#   terraform/modules/epg/main.tf
#   aci_application_profile + aci_application_epg + aci_epg_to_contract
# =============================================================================


# -----------------------------------------------------------------------------
# Task 1: Application Profile 생성/삭제
# cisco.aci.aci_ap → ACI 오브젝트: fvAp
#
# Terraform 대응:
#   resource "aci_application_profile" "this" {
#     parent_dn   = var.tenant_dn   ← v2.18: tenant_dn → parent_dn
#     name        = var.ap_name
#   }
# -----------------------------------------------------------------------------
- name: "Manage Application Profile | {{ item.name }}"
  cisco.aci.aci_ap:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"
    tenant:         "{{ tenant_name }}"
    ap:             "{{ item.name }}"
    description:    "{{ item.description | default('') }}"
    state:          "{{ aci_state }}"

  loop: "{{ application_profiles }}"
  loop_control:
    label: "{{ tenant_name }} / {{ item.name }}"


# -----------------------------------------------------------------------------
# Task 2: EPG 생성/삭제 및 BD 연결
# cisco.aci.aci_epg → ACI 오브젝트: fvAEPg
#
# subelements('epgs') 동작:
#   입력: application_profiles = [
#           { name: "three-tier-ap", epgs: [{name:"web-epg", bd:"web-bd"}, ...] }
#         ]
#   출력: [(three-tier-ap, web-epg), (three-tier-ap, app-epg), ...]
#   → item.0 = AP 오브젝트, item.1 = EPG 오브젝트
#
# Terraform 대응:
#   resource "aci_application_epg" "this" {
#     application_profile_dn = aci_application_profile.this.id
#     relation_fv_rs_bd      = var.bd_dn   ← 전체 BD DN 입력
#   }
# Ansible:
#   bd: "{{ item.1.bd }}" 이름만 입력 → 모듈이 DN 자동 생성
# -----------------------------------------------------------------------------
- name: "Manage EPG | {{ item.0.name }} / {{ item.1.name }} → BD: {{ item.1.bd }}"
  cisco.aci.aci_epg:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"
    tenant:         "{{ tenant_name }}"
    ap:             "{{ item.0.name }}"
    epg:            "{{ item.1.name }}"
    description:    "{{ item.1.description | default('') }}"
    # BD 연결: Terraform은 전체 DN, Ansible은 이름만 입력
    bd:             "{{ item.1.bd }}"
    state:          "{{ aci_state }}"

  loop: "{{ application_profiles | subelements('epgs') }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.name }}"


# -----------------------------------------------------------------------------
# Task 3: EPG → Contract 바인딩
# cisco.aci.aci_epg_to_contract → ACI 오브젝트: fvRsProv / fvRsCons
#
# epg_contract_bindings 플랫 리스트:
#   Scenario 01: web-epg provider allow-http / web-epg consumer allow-http
#   Scenario 02: web-epg consumer web-to-app / app-epg provider web-to-app
#                app-epg consumer app-to-db  / db-epg  provider app-to-db
#
# Contract 방향 (ACI 핵심 개념):
#   provider → 서비스를 제공하는 EPG (서버 역할, 트래픽을 "받는" 쪽)
#   consumer → 서비스를 소비하는 EPG (클라이언트 역할, 트래픽을 "보내는" 쪽)
#
# Terraform 대응:
#   resource "aci_epg_to_contract" "this" {
#     for_each       = { for idx, c in var.contracts : "${c.contract_type}_${idx}" => c }
#     contract_dn    = each.value.contract_dn   ← 전체 Contract DN
#     contract_type  = each.value.contract_type
#   }
# Ansible: contract 이름만 입력 → 모듈이 DN 자동 생성
# -----------------------------------------------------------------------------
- name: "Manage EPG-Contract binding | {{ item.epg }} [{{ item.type }}] → {{ item.contract }}"
  cisco.aci.aci_epg_to_contract:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"
    tenant:         "{{ tenant_name }}"
    ap:             "{{ item.ap }}"
    epg:            "{{ item.epg }}"
    # Terraform: contract_dn (전체 DN)
    # Ansible:   contract (이름만) → 모듈이 DN 자동 처리
    contract:       "{{ item.contract }}"
    # provider → fvRsProv 오브젝트 생성
    # consumer → fvRsCons 오브젝트 생성
    contract_type:  "{{ item.type }}"
    state:          "{{ aci_state }}"

  loop: "{{ epg_contract_bindings }}"
  loop_control:
    label: "{{ item.epg }} [{{ item.type }}] → {{ item.contract }}"


# -----------------------------------------------------------------------------
# Task 4: 생성 결과 출력
# -----------------------------------------------------------------------------
- name: "Debug | EPG / Contract binding DN"
  ansible.builtin.debug:
    msg:
      - "EPG DN : uni/tn-{{ tenant_name }}/ap-{{ item.ap }}/epg-{{ item.epg }}"
      - "Contract [{{ item.type }}] : uni/tn-{{ tenant_name }}/brc-{{ item.contract }}"
  loop: "{{ epg_contract_bindings }}"
  loop_control:
    label: "{{ item.epg }}"
  when: aci_state == "present"