---
# =============================================================================
# Role: aci_networking
# 파일: tasks/main.yml
# 역할: Bridge Domain(BD)과 Subnet을 생성/삭제한다
#
# ACI 오브젝트:
#   Bridge Domain (fvBD)  → uni/tn-{tenant}/BD-{name}
#   Subnet        (fvSubnet) → uni/tn-{tenant}/BD-{name}/subnet-[{gw}/{mask}]
#
# 변수 구조 (group_vars/all/main.yml):
#   bridge_domains: list(object)         ← 단일/복수 BD 모두 처리
#     - name, description, vrf
#       enable_routing, arp_flooding
#       subnets: list(object)
#         - gateway, mask, scope, description
#
# Scenario 01: bridge_domains 1개 (web-bd)
# Scenario 02: bridge_domains 3개 (web-bd / app-bd / db-bd)
#
# Terraform 모듈 비교:
#   terraform/modules/networking/main.tf
#   aci_bridge_domain + aci_subnet
# =============================================================================


# -----------------------------------------------------------------------------
# Task 1: Bridge Domain 생성/삭제
# cisco.aci.aci_bd → ACI 오브젝트: fvBD
#
# Terraform 대응:
#   resource "aci_bridge_domain" "this" {
#     parent_dn          = var.tenant_dn
#     name               = var.bd_name
#     relation_fv_rs_ctx = var.vrf_dn   ← 전체 VRF DN 입력
#     unicast_route      = var.unicast_route
#     arp_flood          = var.arp_flood
#   }
#
# 핵심 차이:
#   Terraform: var.vrf_dn (uni/tn-.../ctx-...) 전체 DN 입력
#   Ansible:   vrf: "{{ item.vrf }}" 이름만 입력 → 모듈이 DN 자동 생성
# -----------------------------------------------------------------------------
- name: "Manage Bridge Domain | {{ item.name }}"
  cisco.aci.aci_bd:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"
    tenant:         "{{ tenant_name }}"
    bd:             "{{ item.name }}"
    description:    "{{ item.description | default('') }}"
    # VRF 연결: 이름만 입력 → 모듈이 uni/tn-{tenant}/ctx-{vrf} DN 자동 생성
    vrf:            "{{ item.vrf }}"
    # enable_routing: L3 유니캐스트 라우팅 활성화
    #   yes → BD가 게이트웨이 역할 (Terraform: unicast_route = "yes")
    #   no  → L2 only 모드
    enable_routing: "{{ item.enable_routing | default('yes') }}"
    # arp_flooding: ARP 플러딩 vs ARP Proxy
    #   no  → ARP Proxy 사용 권장 (enable_routing=yes 환경)
    #   yes → 전통적인 ARP 플러딩 (Terraform: arp_flood = "no")
    arp_flooding:   "{{ item.arp_flooding | default('no') }}"
    state:          "{{ aci_state }}"

  loop: "{{ bridge_domains }}"
  loop_control:
    label: "{{ tenant_name }} / {{ item.name }}"


# -----------------------------------------------------------------------------
# Task 2: Subnet 생성/삭제
# cisco.aci.aci_bd_subnet → ACI 오브젝트: fvSubnet
#
# subelements 필터 동작 원리:
#   입력: bridge_domains = [
#           { name: "web-bd", subnets: [{gateway: "10.10.1.1", mask: "24"}] },
#           { name: "app-bd", subnets: [{gateway: "10.10.2.1", mask: "24"}] }
#         ]
#   출력: [
#           (web-bd 오브젝트, {gateway: "10.10.1.1", mask: "24"}),
#           (app-bd 오브젝트, {gateway: "10.10.2.1", mask: "24"})
#         ]
#   → item.0 = BD 오브젝트, item.1 = Subnet 오브젝트
#
# Terraform 대응:
#   resource "aci_subnet" "this" {
#     for_each  = { for s in var.subnets : s.ip => s }
#     ip        = each.value.ip    ← "10.10.1.1/24" (gateway+mask 합산)
#   }
# Ansible:
#   gateway + mask 분리 입력 (모듈이 내부적으로 CIDR 합산 처리)
# -----------------------------------------------------------------------------
- name: "Manage Subnet | {{ item.0.name }} - {{ item.1.gateway }}/{{ item.1.mask }}"
  cisco.aci.aci_bd_subnet:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"
    tenant:         "{{ tenant_name }}"
    bd:             "{{ item.0.name }}"
    # Terraform: ip = "10.10.1.1/24" (통합 입력)
    # Ansible:   gateway + mask 분리 입력
    gateway:        "{{ item.1.gateway }}"
    mask:           "{{ item.1.mask }}"
    description:    "{{ item.1.description | default('') }}"
    # scope: Subnet 사용 범위
    #   private → Tenant 내부 전용  public → L3Out 광고  shared → VRF 간 공유
    scope:          "{{ item.1.scope | default('private') }}"
    state:          "{{ aci_state }}"

  # subelements: Terraform의 for_each + 중첩 맵 펼치기와 동일한 역할
  loop: "{{ bridge_domains | subelements('subnets') }}"
  loop_control:
    label: "{{ item.0.name }} - {{ item.1.gateway }}/{{ item.1.mask }}"


# -----------------------------------------------------------------------------
# Task 3: 생성 결과 출력
# -----------------------------------------------------------------------------
- name: "Debug | Bridge Domain / Subnet DN"
  ansible.builtin.debug:
    msg:
      - "BD     DN : uni/tn-{{ tenant_name }}/BD-{{ item.0.name }}"
      - "Subnet DN : uni/tn-{{ tenant_name }}/BD-{{ item.0.name }}/subnet-[{{ item.1.gateway }}/{{ item.1.mask }}]"
  loop: "{{ bridge_domains | subelements('subnets') }}"
  loop_control:
    label: "{{ item.0.name }}"
  when: aci_state == "present"