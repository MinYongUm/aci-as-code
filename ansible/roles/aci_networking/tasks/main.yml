---
# =============================================================================
# Role: aci_networking
# 파일: tasks/main.yml
# 역할: Bridge Domain(BD)과 Subnet을 생성하고 VRF에 연결한다
#
# ACI 오브젝트:
#   VRF (fvCtx)              → aci_tenant Role에서 생성 (전달받음)
#   └── Bridge Domain (fvBD) → L2 브로드캐스트 도메인 (VLAN과 유사)
#       └── Subnet (fvSubnet)→ BD의 게이트웨이 IP / 라우팅 범위
#
# DN 경로:
#   BD     → uni/tn-{tenant}/BD-{name}
#   Subnet → uni/tn-{tenant}/BD-{bd}/subnet-[{gateway}/{mask}]
#
# Terraform 모듈 비교:
#   terraform/modules/networking/main.tf 의 aci_bridge_domain + aci_subnet
#
# 실무 비유:
#   BD     = ACI에서의 VLAN (L2 영역)
#   Subnet = 그 VLAN의 게이트웨이 IP + 서브넷 마스크 (ACI의 SVI)
# =============================================================================


# -----------------------------------------------------------------------------
# Task 1: Bridge Domain 생성
# Cisco ACI 모듈: cisco.aci.aci_bd (ACI 오브젝트: fvBD)
#
# Terraform 대응:
#   resource "aci_bridge_domain" "this" {
#     parent_dn          = var.tenant_dn
#     name               = var.bd_name
#     relation_fv_rs_ctx = var.vrf_dn   ← VRF 연결
#     unicast_route      = var.unicast_route
#     arp_flood          = var.arp_flood
#   }
#
# 핵심 차이:
#   Terraform: var.vrf_dn (전체 DN 문자열) 으로 VRF 연결
#   Ansible:   vrf: "{{ vrf_name }}" (이름만 입력) → 모듈이 DN 자동 생성
# -----------------------------------------------------------------------------
- name: "Bridge Domain 생성 | fvBD: {{ bd_name }} (VRF: {{ vrf_name }})"
  cisco.aci.aci_bd:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"

    # BD가 속할 Tenant
    tenant: "{{ tenant_name }}"

    # BD 설정
    bd:          "{{ bd_name }}"
    description: "{{ bd_description }}"

    # VRF 연결 (BD는 반드시 하나의 VRF에 속해야 함)
    # Terraform: relation_fv_rs_ctx = var.vrf_dn
    # Ansible:   vrf = vrf_name (모듈이 DN 자동 처리)
    vrf: "{{ vrf_name }}"

    # enable_routing: L3 유니캐스트 라우팅 활성화
    # Terraform: unicast_route = "yes"
    # Ansible:   enable_routing: true (bool 타입)
    enable_routing: "{{ bd_enable_routing }}"

    # arp_flooding: ARP 플러딩 vs ARP Proxy
    # Terraform: arp_flood = "no"
    # Ansible:   arp_flooding: false (bool 타입)
    arp_flooding: "{{ bd_arp_flooding }}"

    state: "{{ aci_state }}"

  register: bd_result


# -----------------------------------------------------------------------------
# Task 2: Subnet 생성 (반복)
# Cisco ACI 모듈: cisco.aci.aci_bd_subnet (ACI 오브젝트: fvSubnet)
#
# Terraform 대응:
#   resource "aci_subnet" "this" {
#     for_each  = { for s in var.subnets : s.ip => s }
#     parent_dn = aci_bridge_domain.this.id
#     ip        = each.value.ip   ← "10.10.1.1/24" (gateway + mask 합산)
#     scope     = each.value.scope
#   }
#
# Ansible vs Terraform 루프 방식:
#   Terraform: for_each + 맵 키로 리소스 개별 추적 (tfstate에 키로 저장)
#   Ansible:   loop (with_items 최신 버전) → 순서대로 순차 실행
#
# Ansible에서의 BD 순서 의존성:
#   Terraform: aci_subnet.parent_dn → aci_bridge_domain.this.id 참조 (자동)
#   Ansible:   Task 2를 Task 1 다음에 배치 → 순서 명시 (절차적)
# -----------------------------------------------------------------------------
- name: "Subnet 생성 | fvSubnet: {{ item.gateway }}/{{ item.mask }} (BD: {{ bd_name }})"
  cisco.aci.aci_bd_subnet:
    host:           "{{ aci_host }}"
    username:       "{{ aci_username }}"
    password:       "{{ aci_password }}"
    validate_certs: "{{ aci_validate_certs }}"

    tenant: "{{ tenant_name }}"
    bd:     "{{ bd_name }}"

    # Terraform과의 차이:
    #   Terraform: ip = "10.10.1.1/24" (게이트웨이 IP + prefix 합산 문자열)
    #   Ansible:   gateway + mask 분리 입력 (모듈이 내부적으로 합산 처리)
    gateway: "{{ item.gateway }}"
    mask:    "{{ item.mask }}"

    # scope: Subnet 사용 범위
    #   private → Tenant 내부 전용 (L3Out 미사용)
    #   public  → L3Out으로 외부 라우터에 광고
    #   shared  → 다른 Tenant VRF와 공유
    scope:       "{{ item.scope }}"
    description: "{{ item.description }}"

    state: "{{ aci_state }}"

  # loop: group_vars/all.yml의 bd_subnets 리스트를 순회
  # Terraform의 for_each와 기능상 동일, 구현 방식은 절차적
  loop: "{{ bd_subnets }}"
  loop_control:
    label: "{{ item.gateway }}/{{ item.mask }}"  # 로그 출력 간소화

  register: subnet_result


# -----------------------------------------------------------------------------
# Task 3: 생성 결과 출력
# -----------------------------------------------------------------------------
- name: "생성 결과 확인 | Bridge Domain DN"
  ansible.builtin.debug:
    msg:
      - "BD     DN : uni/tn-{{ tenant_name }}/BD-{{ bd_name }}"
      - "Subnet DN : uni/tn-{{ tenant_name }}/BD-{{ bd_name }}/subnet-[{{ item.gateway }}/{{ item.mask }}]"
  loop: "{{ bd_subnets }}"
  loop_control:
    label: "{{ item.gateway }}/{{ item.mask }}"
  when: aci_state == "present"
