# =============================================================================
# Scenario 02 — Three-Tier App
# 파일: ansible.cfg
# 역할: 이 시나리오에서 사용할 Ansible 실행 환경 설정
# =============================================================================

[defaults]
# inventory: 기본 인벤토리 파일 경로 (매번 -i 플래그 생략 가능)
inventory = inventory.yml

# roles_path: Role 탐색 경로
# 시나리오 폴더에서 두 단계 위 → ansible/roles/ 참조
roles_path = ../../roles

# stdout_callback: 실행 출력 형식
# yaml → 태스크 결과를 YAML 형식으로 출력 (가독성 향상)
stdout_callback = yaml

# host_key_checking: SSH 호스트 키 검증
# APIC REST API 통신에는 SSH 불필요 → false
host_key_checking = false

# retry_files_enabled: 실패 시 .retry 파일 생성 여부
# 포트폴리오 환경에서는 불필요
retry_files_enabled = false