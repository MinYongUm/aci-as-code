# =============================================================================
# Scenario 01 — Basic Tenant
# 파일: ansible.cfg
# 역할: 이 시나리오 디렉토리에서 ansible 명령 실행 시 적용할 설정
#
# ansible.cfg 탐색 우선순위:
#   1. ANSIBLE_CONFIG 환경변수
#   2. ./ansible.cfg (현재 디렉토리)  ← 이 파일
#   3. ~/.ansible.cfg
#   4. /etc/ansible/ansible.cfg
# =============================================================================
[defaults]
# roles_path: Ansible이 Role을 탐색할 경로
# 이 시나리오(scenarios/01_basic_tenant/)에서 실행 시
# ../../roles/ → ansible/roles/ 경로에서 Role을 찾음
roles_path = ../../roles

# stdout_callback: 실행 결과 출력 형식
# yaml → 가독성 높은 YAML 형식으로 출력 (기본값: default)
stdout_callback = yaml

# deprecation_warnings: deprecated 기능 경고 출력 여부
deprecation_warnings = True

# host_key_checking: SSH 호스트 키 확인 (ACI 모듈은 HTTPS API 사용이므로 불필요)
host_key_checking = False
