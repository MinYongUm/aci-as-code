---
# =============================================================================
# Scenario 01 — Basic Tenant
# 파일: group_vars/all/main.yml
# 역할: 이 시나리오에서 사용하는 모든 ACI 오브젝트 변수를 정의한다
#
# Role 변수 구조 변경 이력 (v1.7):
#   기존: 스칼라 변수 (bd_name, contract_name, ap_name 등 개별 변수)
#   변경: 리스트 변수 (bridge_domains, contracts, application_profiles)
#   이유: Scenario 02 (Multi-BD/EPG) 지원을 위한 Role 재사용성 확보
# =============================================================================


# -----------------------------------------------------------------------------
# [1] APIC 접속 정보
# aci_password → vault.yml에서 주입 (이 파일에 입력 금지)
# -----------------------------------------------------------------------------
aci_host:           "sandboxapicdc.cisco.com"
aci_username:       "admin"
aci_validate_certs: false
aci_state:          "present"


# -----------------------------------------------------------------------------
# [2] Tenant / VRF
# -----------------------------------------------------------------------------
tenant_name:        "demo-tenant"
tenant_description: "Scenario 01 - Basic Tenant"

vrf_name:        "prod-vrf"
vrf_description: "Production VRF"
vrf_enforcement: "enforced"


# -----------------------------------------------------------------------------
# [3] Bridge Domain / Subnet
# 변경: bd_name + bd_subnets → bridge_domains 리스트
# -----------------------------------------------------------------------------
bridge_domains:
  - name:           "web-bd"
    description:    "Web Bridge Domain"
    vrf:            "prod-vrf"
    enable_routing: "yes"
    arp_flooding:   "no"
    subnets:
      - gateway:     "10.10.1.1"
        mask:        "24"
        scope:       "private"
        description: "Web Subnet GW"


# -----------------------------------------------------------------------------
# [4] Filter / Filter Entry
# 구조 유지 (subelements 대응)
# -----------------------------------------------------------------------------
filters:
  - name:        "filter-http"
    description: "HTTP and HTTPS Filter"
    entries:
      - name:           "tcp-80"
        description:    "Allow TCP port 80 (HTTP)"
        ether_type:     "ip"
        ip_protocol:    "tcp"
        dst_port_start: "http"    # Named port: 80
        dst_port_end:   "http"
      - name:           "tcp-443"
        description:    "Allow TCP port 443 (HTTPS)"
        ether_type:     "ip"
        ip_protocol:    "tcp"
        dst_port_start: "https"   # Named port: 443
        dst_port_end:   "https"


# -----------------------------------------------------------------------------
# [5] Contract / Subject
# 변경: contract_name + subject_name → contracts 리스트
# -----------------------------------------------------------------------------
contracts:
  - name:               "allow-http"
    description:        "Allow HTTP/HTTPS traffic"
    scope:              "tenant"
    subject:            "http-subj"
    subject_description: "HTTP/HTTPS Subject"
    filter:             "filter-http"


# -----------------------------------------------------------------------------
# [6] Application Profile / EPG
# 변경: ap_name + epg_name + bd_name → application_profiles 리스트
# -----------------------------------------------------------------------------
application_profiles:
  - name:        "demo-ap"
    description: "Demo Application Profile"
    epgs:
      - name:        "web-epg"
        description: "Web EPG"
        bd:          "web-bd"


# -----------------------------------------------------------------------------
# [7] EPG-Contract 바인딩
# 변경: epg_contracts → epg_contract_bindings 플랫 리스트
#
# Scenario 01: web-epg가 Provider + Consumer 동시 설정
# (단일 EPG 시나리오 — Scenario 02에서 Provider/Consumer EPG 분리)
# -----------------------------------------------------------------------------
epg_contract_bindings:
  - ap:       "demo-ap"
    epg:      "web-epg"
    contract: "allow-http"
    type:     "provider"

  - ap:       "demo-ap"
    epg:      "web-epg"
    contract: "allow-http"
    type:     "consumer"